# OVRIQ produktions-stak: API + PostgreSQL + Caddy (TLS).
# EU-hosting: kør på Hetzner (Falkenstein/Helsinki) eller Fly.io (ams/arn).
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OVRIQ_DATABASE_URL: postgres://ovriq:${POSTGRES_PASSWORD}@db:5432/ovriq
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - journal:/data          # fallback-journal hvis DB-url fjernes
    networks: [internal]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovriq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ovriq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovriq"]
      interval: 5s
      retries: 10
    networks: [internal]

  caddy:                        # automatisk TLS via Let's Encrypt
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    command: caddy reverse-proxy --from ${OVRIQ_DOMAIN:-localhost} --to api:8642
    depends_on: [api]
    networks: [internal]
    volumes:
      - caddy_data:/data

volumes:
  pgdata:
  journal:
  caddy_data:

networks:
  internal:
